<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART ROUTE</title>
    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="favicon.png.png">
</head>
<body>

    <div class="sidebar">
        
        <div class="logo-area">
            <h1 class="main-title">SMART ROUTE</h1>
            <span class="sub-title">Dijkstra Navigator</span>
        </div>
        
        <div class="controles">
            <div class="control-group">
                <label for="origem">⚫ PARTIDA</label>
                <select id="origem">
                    <option value="A">A - Praça Central</option>
                    <option value="B">B - Mercado</option>
                    <option value="C">C - Estação</option>
                    <option value="D">D - Hospital</option>
                    <option value="E">E - Escola</option>
                    <option value="F">F - Casa</option>
                    <option value="G">G - Pet Shop</option>
                    <option value="H">H - Universidade</option>
                    <option value="I">I - Shopping</option>
                    <option value="J">J - Banco</option>
                    <option value="K">K - Parque</option>
                    <option value="L">L - Museu</option>
                </select>
            </div>

            <div class="control-group">
                <label for="destino">🟠 DESTINO</label>
                <select id="destino">
                    <option value="A">A - Praça Central</option>
                    <option value="B">B - Mercado</option>
                    <option value="C">C - Estação</option>
                    <option value="D" selected>D - Hospital</option>
                    <option value="E">E - Escola</option>
                    <option value="F">F - Casa</option>
                    <option value="G">G - Pet Shop</option>
                    <option value="H">H - Universidade</option>
                    <option value="I">I - Shopping</option>
                    <option value="J">J - Banco</option>
                    <option value="K">K - Parque</option>
                    <option value="L">L - Museu</option>
                </select>
            </div>

            <div class="control-group" style="margin-top: 5px;">
                <div class="balao-interditar">
                    🚫 Clique em uma rua para interdita-la
                </div>
                <button onclick="liberarTodas()" class="btn-liberar">
                    ↺ Liberar todas (<span id="contagem-bloqueadas">0</span>)
                </button>
            </div>

            <button class="btn-mostrar" onclick="mostrarCaminho()">Calcular Rota</button>
        </div>

        <div id="resultado" class="result-card">
            <span class="result-header">// RESULTADO DIJKSTRA</span>
            <div id="texto-resultado">
                Selecione os pontos para calcular.
            </div>
        </div>
    </div>

    <div class="map-container">
        <div class="map">
             <svg class="linhas-svg">
                <line id="linha-A-L" x1="430" y1="330" x2="310" y2="210" class="linha" />
                <line id="linha-A-I" x1="430" y1="330" x2="550" y2="210" class="linha" />
                <line id="linha-A-F" x1="430" y1="330" x2="310" y2="480" class="linha" />
                <line id="linha-A-G" x1="430" y1="330" x2="550" y2="480" class="linha" />
                
                <line id="linha-B-L" x1="230" y1="120" x2="310" y2="210" class="linha" />
                <line id="linha-B-C" x1="230" y1="120" x2="430" y2="90" class="linha" />
                <line id="linha-B-E" x1="230" y1="120" x2="150" y2="360" class="linha" />

                <line id="linha-C-I" x1="430" y1="90" x2="550" y2="210" class="linha" />
                <line id="linha-C-D" x1="430" y1="90" x2="630" y2="120" class="linha" />

                <line id="linha-D-I" x1="630" y1="120" x2="550" y2="210" class="linha" />
                <line id="linha-D-H" x1="630" y1="120" x2="710" y2="360" class="linha" />

                <line id="linha-E-L" x1="150" y1="360" x2="310" y2="210" class="linha" />
                <line id="linha-E-F" x1="150" y1="360" x2="310" y2="480" class="linha" />
                <line id="linha-E-J" x1="150" y1="360" x2="110" y2="540" class="linha" />

                <line id="linha-H-I" x1="710" y1="360" x2="550" y2="210" class="linha" />
                <line id="linha-H-G" x1="710" y1="360" x2="550" y2="480" class="linha" />
                <line id="linha-H-K" x1="710" y1="360" x2="750" y2="540" class="linha" />

                <line id="linha-F-G" x1="310" y1="480" x2="550" y2="480" class="linha" />

                <text x="360" y="270" class="peso">400m</text>
                <text x="480" y="270" class="peso">500m</text>
                <text x="360" y="420" class="peso">700m</text>
                <text x="480" y="420" class="peso">1400m</text>
                <text x="260" y="170" class="peso">600m</text>
                <text x="330" y="110" class="peso">800m</text>
                <text x="180" y="230" class="peso">600m</text>
                <text x="500" y="160" class="peso">700m</text>
                <text x="520" y="110" class="peso">1200m</text>
                <text x="580" y="170" class="peso">900m</text>
                <text x="680" y="240" class="peso">1100m</text>
                <text x="210" y="300" class="peso">600m</text>
                <text x="210" y="430" class="peso">900m</text>
                <text x="120" y="460" class="peso">800m</text>
                <text x="650" y="300" class="peso">1000m</text>
                <text x="630" y="440" class="peso">900m</text>
                <text x="730" y="460" class="peso">1000m</text>
                <text x="420" y="490" class="peso">1300m</text>
            </svg>

            <div class="node" id="node-a"><span class="letter">A</span><span class="name">Praça Central</span></div> 
            <div class="node" id="node-b"><span class="letter">B</span><span class="name">Mercado</span></div>
            <div class="node" id="node-c"><span class="letter">C</span><span class="name">Estação</span></div>
            <div class="node" id="node-d"><span class="letter">D</span><span class="name">Hospital</span></div>
            <div class="node" id="node-e"><span class="letter">E</span><span class="name">Escola</span></div>
            <div class="node" id="node-f"><span class="letter">F</span><span class="name">Casa</span></div>
            <div class="node" id="node-g"><span class="letter">G</span><span class="name">Pet Shop</span></div>
            <div class="node" id="node-h"><span class="letter">H</span><span class="name">Universidade</span></div>
            <div class="node" id="node-i"><span class="letter">I</span><span class="name">Shopping</span></div>
            <div class="node" id="node-j"><span class="letter">J</span><span class="name">Banco</span></div>
            <div class="node" id="node-k"><span class="letter">K</span><span class="name">Parque</span></div>
            <div class="node" id="node-l"><span class="letter">L</span><span class="name">Museu</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
